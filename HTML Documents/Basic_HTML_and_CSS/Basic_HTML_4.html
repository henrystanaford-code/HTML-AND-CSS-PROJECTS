<!DOCTYPE html>
<html>
	<body>
	<style>
	.font_1 {
		background-color: black;
		color: yellow;
		font-size: large;
	}
	.font_2 {
		background-color: darkblue;
		color: white;
		font-size: medium;
	}
	.My_Style {
		background-color: firebrick;
		color: olivedrab;
		text-decoration: underline;
		font-family: "Minion Pro", serif;
		font-size: small;
		}
	</style>
	<h2 class="font_1">This h2 element is styled per class attribute font_1</h2>
	<h3 class="font_2">This h3 element is styled per class attribute font_2</h3>
	<h4 class="font_1">h4 is the same as h2</h4>
	<h1 class="My_Style">MY STYLE</h1>
	</body>
</html>
